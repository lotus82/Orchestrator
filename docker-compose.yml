# Облегченная версия для хостинга: только PostgreSQL и FastAPI.
# Без Redis, Celery и тяжелых библиотек компьютерного зрения.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://game:game@postgres:5432/game_db
      DATABASE_URL_SYNC: postgresql://game:game@postgres:5432/game_db
      VIDEO_STORAGE_PATH: /app/videos
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
